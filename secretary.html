<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عيادتي — واجهة السكرتيرة</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
    .header{background:#1e293b;border-bottom:1px solid #334155;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between}
    .header-logo{font-size:1rem;font-weight:700;color:#38bdf8}
    .layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 56px)}

    /* Queue panel */
    .queue-panel{background:#1e293b;border-left:1px solid #334155;overflow-y:auto}
    .queue-header{padding:1rem;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
    .queue-title{font-size:.875rem;font-weight:600;color:#f1f5f9}
    .badge-count{background:#ef4444;color:#fff;border-radius:20px;padding:2px 8px;font-size:.75rem;font-weight:700}
    .queue-item{padding:.875rem 1rem;border-bottom:1px solid #1e2d3d;cursor:pointer;transition:background .15s}
    .queue-item:hover,.queue-item.active{background:#1a2535}
    .queue-item.active{border-right:3px solid #38bdf8}
    .qi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .qi-phone{font-size:.85rem;font-weight:500;color:#e2e8f0}
    .qi-time{font-size:.7rem;color:#475569}
    .qi-msg{font-size:.75rem;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
    .qi-reason{font-size:.7rem;padding:2px 6px;border-radius:6px;background:#fef3c7;color:#92400e;margin-top:4px;display:inline-block}
    .qi-status-seen{border-right-color:#fbbf24!important}
    .qi-status-resolved{opacity:.4}
    .empty-queue{text-align:center;padding:3rem 1rem;color:#475569}

    /* Chat panel */
    .chat-panel{display:flex;flex-direction:column;background:#0f172a}
    .chat-top{padding:1rem 1.5rem;border-bottom:1px solid #1e293b;background:#1e293b;display:flex;align-items:center;justify-content:space-between}
    .chat-patient{font-size:.95rem;font-weight:600;color:#f1f5f9}
    .chat-phone{font-size:.8rem;color:#64748b;margin-top:2px}
    .chat-actions{display:flex;gap:8px}
    .act-btn{padding:5px 12px;border-radius:7px;font-size:.75rem;font-weight:500;cursor:pointer;border:none}
    .act-resolve{background:#166534;color:#4ade80}.act-resolve:hover{background:#15803d;color:#fff}
    .act-book{background:#1e40af;color:#93c5fd}.act-book:hover{background:#1d4ed8;color:#fff}
    .chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:8px}
    .msg{max-width:70%;padding:8px 12px;border-radius:10px;font-size:.875rem;line-height:1.5}
    .msg.in{background:#1e293b;border:1px solid #334155;align-self:flex-start;border-radius:0 10px 10px 10px;color:#cbd5e1}
    .msg.out{background:#1d4ed8;color:#fff;align-self:flex-end;border-radius:10px 0 10px 10px}
    .msg-time{font-size:.7rem;opacity:.6;margin-top:2px}
    .msg.out .msg-time{text-align:left}
    .chat-input-area{padding:1rem 1.5rem;border-top:1px solid #1e293b;background:#1e293b;display:flex;gap:10px}
    .chat-input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 14px;font-size:.875rem;color:#e2e8f0;font-family:inherit;outline:none;resize:none;min-height:44px;max-height:120px}
    .chat-input:focus{border-color:#38bdf8}
    .send-btn{padding:10px 20px;background:#38bdf8;color:#0f172a;border:none;border-radius:10px;font-size:.875rem;font-weight:700;cursor:pointer;white-space:nowrap}
    .send-btn:hover{background:#0ea5e9}
    .no-chat{display:flex;align-items:center;justify-content:center;flex:1;color:#475569;flex-direction:column;gap:.5rem}
    .no-chat-icon{font-size:2rem}

    /* Quick replies */
    .quick-replies{padding:.5rem 1.5rem;display:flex;gap:6px;flex-wrap:wrap;background:#1e293b;border-bottom:1px solid #334155}
    .qr-btn{padding:4px 12px;background:#334155;color:#94a3b8;border:none;border-radius:20px;font-size:.75rem;cursor:pointer}
    .qr-btn:hover{background:#38bdf8;color:#0f172a}

    .pulse{animation:pulse2 1.5s infinite}
    @keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏥 لوحة السكرتيرة</div>
  <div style="display:flex;align-items:center;gap:12px">
    <div style="display:flex;align-items:center;gap:6px;font-size:.8rem;color:#94a3b8">
      <div style="width:8px;height:8px;border-radius:50%;background:#4ade80" class="pulse"></div>
      متصل
    </div>
    <a href="dashboard.html" style="color:#64748b;font-size:.8rem;text-decoration:none">← الداشبورد</a>
  </div>
</div>

<div class="layout">

  <!-- Queue -->
  <div class="queue-panel">
    <div class="queue-header">
      <span class="queue-title">طابور الانتظار</span>
      <span class="badge-count" id="queue-count">0</span>
    </div>
    <div id="queue-list"><div class="empty-queue">لا توجد محادثات حالياً ✨</div></div>
  </div>

  <!-- Chat -->
  <div class="chat-panel" id="chat-panel">
    <div class="no-chat">
      <div class="no-chat-icon">💬</div>
      <span>اختر محادثة من القائمة</span>
    </div>
  </div>

</div>

<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let clinicId = null, activePhone = null, handoffItems = [];
const QUICK_REPLIES = [
  'شكراً لتواصلك معنا 😊',
  'سيتم التواصل معك خلال دقائق',
  'يمكنك الحجز عبر البوت بكتابة "حجز"',
  'العيادة متاحة السبت-الخميس 9ص-9م',
  'يرجى الاتصال بنا مباشرةً للاستفسار',
  'تم حجز موعدك بنجاح ✅'
];

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  const { data } = await sb.from('clinics').select('id').eq('user_id', session.user.id).single();
  if (!data) return;
  clinicId = data.id;

  await loadQueue();

  // Realtime — يظهر الانتظار الجديد فوراً
  sb.channel('handoff').on('postgres_changes', {
    event: '*', schema: 'public', table: 'handoff_queue',
    filter: `clinic_id=eq.${clinicId}`
  }, () => loadQueue()).subscribe();
}

async function loadQueue() {
  const { data } = await sb.from('handoff_queue')
    .select('*').eq('clinic_id', clinicId)
    .in('status', ['waiting','seen'])
    .order('created_at', { ascending: false }).limit(30);
  handoffItems = data || [];
  renderQueue();
}

function renderQueue() {
  const waiting = handoffItems.filter(h => h.status === 'waiting').length;
  document.getElementById('queue-count').textContent = waiting;

  if (!handoffItems.length) {
    document.getElementById('queue-list').innerHTML = '<div class="empty-queue">لا توجد محادثات حالياً ✨</div>';
    return;
  }

  document.getElementById('queue-list').innerHTML = handoffItems.map(h => `
    <div class="queue-item ${h.status === 'seen' ? 'qi-status-seen' : ''} ${h.patient_phone === activePhone ? 'active' : ''}"
         onclick="openChat('${h.patient_phone}','${h.id}','${h.patient_name||'مريض'}')">
      <div class="qi-top">
        <span class="qi-phone">${h.patient_name || 'مريض'} — ${h.patient_phone}</span>
        <span class="qi-time">${timeSince(h.created_at)}</span>
      </div>
      <div class="qi-msg">"${h.last_message}"</div>
      ${h.reason ? `<span class="qi-reason">${h.reason}</span>` : ''}
    </div>
  `).join('');
}

async function openChat(phone, handoffId, name) {
  activePhone = phone;

  // Mark as seen
  await sb.from('handoff_queue').update({ status: 'seen' }).eq('id', handoffId);
  renderQueue();

  // Load messages
  const { data: msgs } = await sb.from('wa_messages')
    .select('*').eq('clinic_id', clinicId).eq('patient_phone', phone)
    .order('created_at', { ascending: true }).limit(50);

  const panel = document.getElementById('chat-panel');
  panel.innerHTML = `
    <div class="chat-top">
      <div>
        <div class="chat-patient">${name}</div>
        <div class="chat-phone">${phone}</div>
      </div>
      <div class="chat-actions">
        <button class="act-btn act-book" onclick="sendQuick('يمكنك الحجز الآن بكتابة: حجز')">+ حجز</button>
        <button class="act-btn act-resolve" onclick="resolveChat('${handoffId}','${phone}')">✓ تم الحل</button>
      </div>
    </div>
    <div class="quick-replies">
      ${QUICK_REPLIES.map(r=>`<button class="qr-btn" onclick="sendQuick('${r}')">${r}</button>`).join('')}
    </div>
    <div class="chat-messages" id="chat-msgs">
      ${(msgs||[]).map(m=>`
        <div>
          <div class="msg ${m.direction}">
            ${m.content.replace(/\n/g,'<br>').replace(/\*(.*?)\*/g,'<strong>$1</strong>')}
            <div class="msg-time">${fmtTime(m.created_at)}</div>
          </div>
        </div>`).join('')}
    </div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="reply-input" placeholder="اكتب ردك هنا..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendReply()}"></textarea>
      <button class="send-btn" onclick="sendReply()">إرسال</button>
    </div>
  `;

  const msgs_el = document.getElementById('chat-msgs');
  if (msgs_el) msgs_el.scrollTop = msgs_el.scrollHeight;
}

async function sendReply() {
  const input = document.getElementById('reply-input');
  const text = input?.value.trim();
  if (!text || !activePhone) return;
  input.value = '';

  // أرسل عبر Worker
  const res = await fetch(`${WORKER_URL}/api/secretary/send`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone: activePhone, clinicId, message: text })
  });

  if (res.ok) {
    // أضف الرسالة محلياً
    const msgs_el = document.getElementById('chat-msgs');
    if (msgs_el) {
      msgs_el.innerHTML += `<div><div class="msg out">${text}<div class="msg-time">الآن</div></div></div>`;
      msgs_el.scrollTop = msgs_el.scrollHeight;
    }
  }
}

function sendQuick(text) {
  const input = document.getElementById('reply-input');
  if (input) { input.value = text; sendReply(); }
}

async function resolveChat(handoffId, phone) {
  await sb.from('handoff_queue').update({
    status: 'resolved',
    resolved_at: new Date().toISOString()
  }).eq('id', handoffId);

  // أعد البوت للمريض
  await fetch(`${WORKER_URL}/api/secretary/send`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, clinicId, message: 'نشكرك على تواصلك معنا 💙 إذا احتجت أي مساعدة أخرى، نحن هنا.', resetBot: true })
  });

  await loadQueue();
  document.getElementById('chat-panel').innerHTML = `<div class="no-chat"><div class="no-chat-icon">✅</div><span>تم حل المحادثة</span></div>`;
  activePhone = null;
}

function timeSince(ts) {
  const diff = Math.floor((Date.now() - new Date(ts)) / 60000);
  if (diff < 1) return 'الآن';
  if (diff < 60) return `منذ ${diff} د`;
  if (diff < 1440) return `منذ ${Math.floor(diff/60)} س`;
  return `منذ ${Math.floor(diff/1440)} ي`;
}
function fmtTime(ts) {
  const d = new Date(ts);
  return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

init();
</script>
</body>
</html>
